<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фермерский рай Плюс</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #e8f5e9;
            margin: 0;
            padding: 20px;
            color: #2e7d32;
        }
        #game-container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #1b5e20;
        }
        #locations {
            display: flex;
            gap: 10px;
            margin: 10px 0;
        }
        .location-btn {
            padding: 8px 12px;
            background-color: #81c784;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .location-btn.active {
            background-color: #2e7d32;
            font-weight: bold;
        }
        #garden {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 10px;
            margin: 20px 0;
            min-height: 500px;
        }
        .plot {
            width: 100%;
            aspect-ratio: 1/1;
            background-color: #8d6e63;
            border: 2px solid #5d4037;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
        }
        .plot:hover {
            transform: scale(1.05);
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }
        .plant {
            width: 80%;
            height: 0;
            transition: height 0.5s;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: bottom;
            position: relative;
            z-index: 2;
        }
        .plant-img {
            width: 100%;
            height: 100%;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: bottom;
        }
        .special-plant {
            filter: drop-shadow(0 0 5px gold);
            animation: glow 2s infinite alternate;
        }
        @keyframes glow {
            from { filter: drop-shadow(0 0 5px gold); }
            to { filter: drop-shadow(0 0 15px gold); }
        }
        .water-drop {
            position: absolute;
            width: 20px;
            height: 20px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path fill="%2300BFFF" d="M10 0C6 6 0 8 0 14c0 3.3 2.7 6 6 6h8c3.3 0 6-2.7 6-6 0-6-6-8-10-14z"/></svg>');
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 3;
        }
        .progress-bar {
            width: 90%;
            height: 8px;
            background-color: #a5d6a7;
            margin: 5px 0;
            border-radius: 4px;
            overflow: hidden;
        }
        .progress {
            height: 100%;
            background-color: #2e7d32;
            width: 0%;
            transition: width 0.3s;
        }
        #controls {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            margin: 20px 0;
        }
        .control-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        button {
            padding: 10px 15px;
            background-color: #4caf50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
        }
        button:hover {
            background-color: #388e3c;
            transform: translateY(-2px);
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
            transform: none;
        }
        #stats {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 20px;
            margin: 20px 0;
            padding: 15px;
            background-color: #c8e6c9;
            border-radius: 10px;
        }
        .stat {
            font-size: 18px;
            font-weight: bold;
        }
        #plant-selector {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 20px 0;
            max-height: 300px;
            overflow-y: auto;
            padding: 10px;
            background-color: #e8f5e9;
            border-radius: 10px;
        }
        .plant-option {
            padding: 10px;
            border: 2px solid #81c784;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            background-color: white;
        }
        .plant-option:hover {
            background-color: #c8e6c9;
            transform: scale(1.02);
        }
        .plant-option.selected {
            background-color: #81c784;
            border-color: #4caf50;
            font-weight: bold;
        }
        .plant-option img {
            width: 50px;
            height: 50px;
            object-fit: contain;
            margin: 0 auto;
            display: block;
        }
        #fertilizers {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 20px 0;
            padding: 10px;
            background-color: #d7ccc8;
            border-radius: 10px;
        }
        .fertilizer {
            padding: 10px;
            border: 2px solid #8d6e63;
            border-radius: 8px;
            cursor: pointer;
            background-color: white;
            transition: all 0.2s;
        }
        .fertilizer:hover {
            background-color: #d7ccc8;
            transform: scale(1.02);
        }
        .fertilizer img {
            width: 50px;
            height: 50px;
            object-fit: contain;
            margin: 0 auto;
            display: block;
        }
        .weather-icon {
            font-size: 24px;
            margin-left: 10px;
        }
        .sunny { color: #ffc107; }
        .rainy { color: #2196f3; }
        .stormy { color: #673ab7; }
        .cloudy { color: #9e9e9e; }
        .foggy { color: #bdbdbd; }
        .snowy { color: #b3e5fc; }
        #time-container {
            margin: 20px 0;
            padding: 15px;
            background-color: #bbdefb;
            border-radius: 10px;
            text-align: center;
        }
        #day-progress {
            width: 100%;
            height: 20px;
            background-color: #e0e0e0;
            border-radius: 10px;
            margin-top: 10px;
            overflow: hidden;
        }
        #day-progress-bar {
            height: 100%;
            background-color: #2196f3;
            width: 0%;
            transition: width 1s linear;
        }
        .tooltip {
            position: absolute;
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 14px;
            z-index: 100;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
        #pets-container {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin: 20px 0;
            padding: 15px;
            background-color: #ffecb3;
            border-radius: 10px;
        }
        .pet {
            padding: 10px;
            border: 2px solid #ffa000;
            border-radius: 8px;
            background-color: #fff8e1;
            cursor: pointer;
            transition: all 0.2s;
        }
        .pet:hover {
            transform: scale(1.05);
        }
        .pet img {
            width: 80px;
            height: 80px;
            object-fit: contain;
        }
        .pet.active {
            background-color: #ffd54f;
            border-color: #ff6f00;
        }
        .pet-cost {
            font-weight: bold;
            color: #e65100;
        }
        .out-of-stock {
            opacity: 0.5;
            position: relative;
        }
        .out-of-stock::after {
            content: "Нет в наличии";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(255, 0, 0, 0.7);
            color: white;
            padding: 2px 5px;
            border-radius: 5px;
            font-size: 12px;
        }
        .quick-nav {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 1000;
        }
        .quick-nav-btn {
            padding: 10px;
            background-color: #4caf50;
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .regrow-icon {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="quick-nav">
        <button class="quick-nav-btn" onclick="scrollToSection('stats')">📊</button>
        <button class="quick-nav-btn" onclick="scrollToSection('pets-container')">🐾</button>
        <button class="quick-nav-btn" onclick="scrollToSection('plant-selector')">🌱</button>
        <button class="quick-nav-btn" onclick="scrollToSection('fertilizers')">🧪</button>
        <button class="quick-nav-btn" onclick="scrollToSection('garden')">🪴</button>
    </div>

    <div id="game-container">
        <h1>Фермерский рай Плюс</h1>
        
        <div id="locations">
            <button class="location-btn active" onclick="changeLocation('field')">Поле</button>
            <button class="location-btn" onclick="changeLocation('greenhouse')">Теплица</button>
            <button class="location-btn" onclick="changeLocation('garden')">Сад</button>
            <button class="location-btn" onclick="changeLocation('orchard')">Фруктовый сад</button>
        </div>
        
        <div id="stats">
            <div class="stat">День: <span id="day">1</span> <span id="weather-icon" class="weather-icon sunny">☀️</span></div>
            <div class="stat">Деньги: <span id="money">1000</span> ₽</div>
            <div class="stat">Растений выращено: <span id="grown-count">0</span></div>
            <div class="stat">Особых растений: <span id="special-count">0</span></div>
            <div class="stat">Погода: <span id="weather">Ясно</span></div>
            <div class="stat">Сезон: <span id="season">Весна</span></div>
            <div class="stat">До смены сезона: <span id="season-change">30</span> дней</div>
            <div class="stat">Питомцы: <span id="active-pets">Нет</span></div>
            <div class="stat">Локация: <span id="current-location">Поле</span></div>
        </div>
        
        <div id="time-container">
            <h3>Текущий день: <span id="day-time">0</span>/12 сек</h3>
            <div id="day-progress">
                <div id="day-progress-bar"></div>
            </div>
        </div>
        
        <div id="pets-container">
            <h3 style="width: 100%;">Питомцы (можно выбрать несколько):</h3>
            <!-- Pet options will be added by JavaScript -->
        </div>
        
        <div id="plant-selector">
            <h3 style="grid-column: 1 / -1;">Выберите растение (обновление через <span id="restock-days">5</span> дней):</h3>
            <!-- Plant options will be added by JavaScript -->
        </div>
        
        <div id="fertilizers">
            <h3 style="grid-column: 1 / -1;">Удобрения:</h3>
            <!-- Fertilizers will be added by JavaScript -->
        </div>
        
        <div id="controls">
            <div class="control-group">
                <button onclick="waterAll()">Полить все (W) - <span id="water-cost">100</span> ₽</button>
                <button onclick="harvestAll()">Собрать урожай (H)</button>
            </div>
            <div class="control-group">
                <button onclick="buyPlot()">Купить грядку (<span id="plot-cost">50</span> ₽)</button>
                <button onclick="restockNow()">Досрочное пополнение (200 ₽)</button>
            </div>
        </div>
        
        <div id="garden"></div>
    </div>

    <div class="tooltip" id="tooltip"></div>

    <script>
        // Игровые переменные
        let currentDay = 1;
        let money = 1000000000000000000000000000000;
        let grownPlantsCount = 0;
        let specialPlantsCount = 0;
        let selectedPlant = null;
        let selectedFertilizer = null;
        let plots = [];
        let initialPlots = 15;
        let plotCost = 50;
        let waterCost = 100;
        let currentWeather = 'sunny';
        let weatherDuration = 3;
        let weatherDaysLeft = 3;
        let seasonDaysLeft = 30;
        let restockDaysLeft = 5;
        let activePets = [];
        let currentLocation = 'field';
        let dayTimer = null;
        let daySeconds = 0;
        let priceInflation = 1.0;
        
        // Локации
        const locations = {
            field: { name: "Поле", size: 15, priceMultiplier: 1.0 },
            greenhouse: { name: "Теплица", size: 10, priceMultiplier: 1.2 },
            garden: { name: "Сад", size: 12, priceMultiplier: 1.1 },
            orchard: { name: "Фруктовый сад", size: 8, priceMultiplier: 1.3 }
        };
        
        // Типы погоды и их эффекты
        const weatherTypes = {
            sunny: { 
                name: "Ясно", 
                icon: "☀️", 
                effect: "Нормальный рост, некоторые растения вянут", 
                growthMultiplier: 1.0,
                color: "sunny",
                onDayStart: function() {
                    // 10% chance that some plants will wither
                    if (Math.random() < 0.1) {
                        plots.forEach(plot => {
                            if (plot.element.dataset.state === 'planted' && 
                                plantTypes[plot.plant].witherInSun && 
                                Math.random() < 0.3) {
                                plot.growth = Math.max(0, plot.growth - 1);
                                showTooltip(plot.element, `${plantTypes[plot.plant].name} вянет на солнце!`);
                            }
                        });
                    }
                }
            },
            rainy: { 
                name: "Дождь", 
                icon: "🌧️", 
                effect: "Растения растут быстрее (+20%), грибы любят дождь", 
                growthMultiplier: 1.2,
                color: "rainy",
                onDayStart: function() {
                    // Mushrooms grow faster in rain
                    plots.forEach(plot => {
                        if (plot.element.dataset.state === 'planted' && 
                            plantTypes[plot.plant].loveRain) {
                            plot.growth += 0.5;
                            showTooltip(plot.element, `${plantTypes[plot.plant].name} любит дождь!`);
                        }
                    });
                }
            },
            stormy: { 
                name: "Гроза", 
                icon: "⛈️", 
                effect: "Растения растут медленнее (-10%), шанс повредить растения", 
                growthMultiplier: 0.9,
                color: "stormy",
                onDayStart: function() {
                    // 15% chance to damage plants during storm
                    if (Math.random() < 0.15) {
                        damageRandomPlant();
                    }
                }
            },
            cloudy: { 
                name: "Облачно", 
                icon: "☁️", 
                effect: "Нормальный рост, тенелюбивые растения радуются", 
                growthMultiplier: 1.0,
                color: "cloudy",
                onDayStart: function() {
                    // Shadow-loving plants grow faster
                    plots.forEach(plot => {
                        if (plot.element.dataset.state === 'planted' && 
                            plantTypes[plot.plant].loveShade) {
                            plot.growth += 0.3;
                            showTooltip(plot.element, `${plantTypes[plot.plant].name} любит облачность!`);
                        }
                    });
                }
            },
            foggy: { 
                name: "Туман", 
                icon: "🌫️", 
                effect: "Растения растут медленнее (-15%), грибы растут быстрее", 
                growthMultiplier: 0.85,
                color: "foggy",
                onDayStart: function() {
                    // Mushrooms love fog
                    plots.forEach(plot => {
                        if (plot.element.dataset.state === 'planted' && 
                            plantTypes[plot.plant].loveFog) {
                            plot.growth += 0.7;
                            showTooltip(plot.element, `${plantTypes[plot.plant].name} процветает в тумане!`);
                        }
                    });
                }
            },
            snowy: { 
                name: "Снег", 
                icon: "❄️", 
                effect: "Растения не растут, кроме морозостойких", 
                growthMultiplier: 0.0,
                color: "snowy",
                onDayStart: function() {
                    // Winter plants grow normally
                    plots.forEach(plot => {
                        if (plot.element.dataset.state === 'planted' && 
                            plantTypes[plot.plant].season === 'winter') {
                            plot.growth += 1;
                            showTooltip(plot.element, `${plantTypes[plot.plant].name} не боится снега!`);
                        }
                    });
                }
            }
        };
        
        // 16 удобрений
        const fertilizerTypes = {
            organic: { name: "Органическое", cost: 20, effect: "+10% к скорости роста", growthMultiplier: 1.1, duration: 3, image: "🌱" },
            super: { name: "Суперудобрение", cost: 50, effect: "+30% к скорости роста", growthMultiplier: 1.3, duration: 5, image: "💪" },
            special: { name: "Особое", cost: 100, effect: "+50% к скорости роста, +5% шанс особого растения", growthMultiplier: 1.5, specialChance: 0.05, duration: 3, image: "✨" },
            winter: { name: "Зимнее", cost: 40, effect: "Позволяет растениям расти зимой", growthMultiplier: 1.0, winterProof: true, duration: 5, image: "❄️" },
            fast: { name: "Быстрый рост", cost: 60, effect: "+40% к скорости роста", growthMultiplier: 1.4, duration: 4, image: "⚡" },
            magic: { name: "Магическое", cost: 150, effect: "+70% к скорости роста, +10% шанс особого растения", growthMultiplier: 1.7, specialChance: 0.1, duration: 4, image: "🔮" },
            premium: { name: "Премиум", cost: 200, effect: "+100% к скорости роста", growthMultiplier: 2.0, duration: 5, image: "🏆" },
            balanced: { name: "Сбалансированное", cost: 45, effect: "+25% к скорости роста, работает в любую погоду", growthMultiplier: 1.25, weatherProof: true, duration: 4, image: "⚖️" },
            rain: { name: "Дождевое", cost: 35, effect: "+50% эффективности в дождь", rainBonus: 0.5, duration: 3, image: "🌧️" },
            sunny: { name: "Солнечное", cost: 30, effect: "+40% эффективности в ясную погоду", sunnyBonus: 0.4, duration: 3, image: "☀️" },
            storm: { name: "Грозовое", cost: 40, effect: "Защита от грозы", stormProtection: true, duration: 3, image: "⚡" },
            golden: { name: "Золотое", cost: 250, effect: "+80% к скорости роста, +15% шанс особого растения", growthMultiplier: 1.8, specialChance: 0.15, duration: 5, image: "💰" },
            basic: { name: "Базовое", cost: 15, effect: "+5% к скорости роста", growthMultiplier: 1.05, duration: 2, image: "🌿" },
            double: { name: "Двойное", cost: 80, effect: "Удваивает награду за растение", doubleReward: true, duration: 3, image: "✌️" },
            secret: { name: "Секретное", cost: 120, effect: "Случайный эффект каждый день", randomEffect: true, duration: 4, image: "❓" },
            eternal: { name: "Вечное", cost: 300, effect: "Постоянный эффект (не исчезает)", eternal: true, growthMultiplier: 1.5, image: "♾️" }
        };
        
        // 10 питомцев
        const petTypes = {
            dog: { name: "Собака", cost: 200, effect: "Уменьшает урон от грозы на 50%", image: "🐕" },
            cat: { name: "Кошка", cost: 150, effect: "Увеличивает шанс особых растений на 3%", image: "🐈" },
            rabbit: { name: "Кролик", cost: 100, effect: "Ускоряет рост растений на 5%", image: "🐇" },
            chicken: { name: "Курица", cost: 120, effect: "Дает 10 ₽ каждый день", image: "🐔" },
            cow: { name: "Корова", cost: 300, effect: "Удваивает награду за 1 растение каждый день", image: "🐄" },
            bee: { name: "Пчела", cost: 80, effect: "Увеличивает эффективность удобрений на 10%", image: "🐝" },
            pig: { name: "Свинья", cost: 180, effect: "Уменьшает стоимость полива на 20%", image: "🐖" },
            sheep: { name: "Овца", cost: 160, effect: "Увеличивает продажную цену растений на 15%", image: "🐑" },
            fox: { name: "Лиса", cost: 220, effect: "Защищает от вредителей (случайные потери роста)", image: "🦊" },
            owl: { name: "Сова", cost: 250, effect: "Увеличивает продолжительность удобрений на 1 день", image: "🦉" }
        };
        
        // 40 различных растений с изображениями и особыми свойствами
        const plantTypes = {
            // Весенние растения
            tulip: { name: "Тюльпан", type: "flower", cost: 10, growthTime: 3, reward: 20, season: "spring", image: "🌷", witherInSun: true },
            daffodil: { name: "Нарцисс", type: "flower", cost: 12, growthTime: 4, reward: 25, season: "spring", image: "🌼", witherInSun: true },
            strawberry: { name: "Клубника", type: "fruit", cost: 25, growthTime: 6, reward: 60, season: "spring", image: "🍓", regrowable: true, regrowTime: 3 },
            spinach: { name: "Шпинат", type: "vegetable", cost: 15, growthTime: 5, reward: 35, season: "spring", image: "🥬", loveShade: true },
            carrot: { name: "Морковь", type: "vegetable", cost: 10, growthTime: 4, reward: 25, season: "spring", image: "🥕" },
            
            // Летние растения
            sunflower: { name: "Подсолнух", type: "flower", cost: 20, growthTime: 5, reward: 40, season: "summer", image: "🌻", loveSun: true },
            tomato: { name: "Помидор", type: "vegetable", cost: 15, growthTime: 5, reward: 35, season: "summer", image: "🍅", regrowable: true, regrowTime: 2 },
            corn: { name: "Кукуруза", type: "vegetable", cost: 18, growthTime: 6, reward: 45, season: "summer", image: "🌽" },
            watermelon: { name: "Арбуз", type: "fruit", cost: 30, growthTime: 8, reward: 70, season: "summer", image: "🍉" },

        // Инициализация игры
        function initGame() {
            const garden = document.getElementById('garden');
            garden.innerHTML = '';
            plots = [];
            
            // Создаем начальные грядки
            for (let i = 0; i < initialPlots; i++) {
                createPlot();
            }
            
            // Инициализируем доступные растения (только сезонные)
            updateAvailablePlants();
            
            // Заполняем выбор питомцев
            const petsContainer = document.getElementById('pets-container');
            for (const [id, pet] of Object.entries(petTypes)) {
                const petElement = document.createElement('div');
                petElement.className = 'pet';
                petElement.dataset.id = id;
                petElement.innerHTML = `
                    <img src="https://emojicdn.elk.sh/${encodeURIComponent(pet.image)}?style=google" alt="${pet.name}">
                    <strong>${pet.name}</strong><br>
                    Цена: <span class="pet-cost">${pet.cost} ₽</span><br>
                    Эффект: ${pet.effect}
                `;
                petElement.onclick = () => togglePet(id);
                petsContainer.appendChild(petElement);
            }
            
            // Заполняем выбор удобрений
            const fertilizerContainer = document.getElementById('fertilizers');
            for (const [id, fertilizer] of Object.entries(fertilizerTypes)) {
                const fertilizerOption = document.createElement('div');
                fertilizerOption.className = 'fertilizer';
                fertilizerOption.dataset.id = id;
                fertilizerOption.innerHTML = `
                    <img src="https://emojicdn.elk.sh/${encodeURIComponent(fertilizer.image)}?style=google" alt="${fertilizer.name}">
                    <strong>${fertilizer.name}</strong><br>
                    Цена: ${Math.round(fertilizer.cost * priceInflation)} ₽<br>
                    Эффект: ${fertilizer.effect}<br>
                    Длительность: ${fertilizer.duration || '∞'} дней
                `;
                fertilizerOption.onclick = () => buyFertilizer(id);
                fertilizerContainer.appendChild(fertilizerOption);
            }
            
            // Инициализируем погоду
            changeWeather();
            
            // Запускаем таймер дня
            startDayTimer();
            
            updateStats();
            setupKeyboardControls();
        }
        
        // Обновить доступные растения (только сезонные)
        function updateAvailablePlants() {
            const currentSeason = getCurrentSeason();
            availablePlants = Object.entries(plantTypes)
                .filter(([id, plant]) => plant.season === currentSeason)
                .map(([id, plant]) => id);
            
            // Добавляем 5 случайных растений из других сезонов
            const otherPlants = Object.entries(plantTypes)
                .filter(([id, plant]) => plant.season !== currentSeason)
                .sort(() => 0.5 - Math.random())
                .slice(0, 5)
                .map(([id, plant]) => id);
            
            availablePlants = [...availablePlants, ...otherPlants];
            
            // Обновляем отображение растений в магазине
            const plantSelector = document.getElementById('plant-selector');
            plantSelector.innerHTML = '<h3 style="grid-column: 1 / -1;">Выберите растение (обновление через <span id="restock-days">' + restockDaysLeft + '</span> дней):</h3>';
            
            availablePlants.forEach(plantId => {
                const plant = plantTypes[plantId];
                const plantOption = document.createElement('div');
                plantOption.className = 'plant-option';
                plantOption.dataset.id = plantId;
                plantOption.innerHTML = `
                    <img src="https://emojicdn.elk.sh/${encodeURIComponent(plant.image)}?style=google" alt="${plant.name}">
                    <strong>${plant.name}</strong><br>
                    Цена: ${Math.round(plant.cost * priceInflation)} ₽<br>
                    Время роста: ${plant.growthTime} дней<br>
                    Награда: ${Math.round(plant.reward * (activePets.includes('sheep') ? 1.15 : 1))} ₽<br>
                    Сезон: ${getSeasonName(plant.season)}
                    ${plant.regrowable ? '<br>Многократный сбор!' : ''}
                `;
                plantOption.onclick = () => selectPlant(plantId);
                plantSelector.appendChild(plantOption);
            });
        }
        
        function getSeasonName(season) {
            const seasons = {
                spring: "Весна",
                summer: "Лето",
                autumn: "Осень",
                winter: "Зима"
            };
            return seasons[season] || season;
        }
        
        // Создать грядку
        function createPlot() {
            const garden = document.getElementById('garden');
            const plot = document.createElement('div');
            plot.className = 'plot';
            plot.dataset.state = 'empty';
            
            const waterDrop = document.createElement('div');
            waterDrop.className = 'water-drop';
            
            plot.appendChild(waterDrop);
            garden.appendChild(plot);
            
            const plotIndex = plots.length;
            plot.onclick = () => handlePlotClick(plotIndex);
            
            plots.push({
                element: plot,
                plant: null,
                growth: 0,
                watered: false,
                fertilized: false,
                fertilizer: null,
                fertilizerDaysLeft: 0,
                special: false,
                regrowCount: 0
            });
        }
        
        // Купить новую грядку
        function buyPlot() {
            const cost = Math.round(plotCost * priceInflation);
            if (money >= cost) {
                money -= cost;
                createPlot();
                updateStats();
                // Увеличиваем стоимость следующей грядки
                plotCost = Math.floor(plotCost * 1.2);
                document.getElementById('plot-cost').textContent = Math.round(plotCost * priceInflation);
            } else {
                alert(`Недостаточно денег! Нужно ${cost} ₽.`);
            }
        }
        
        // Обработка клика по грядке
        function handlePlotClick(index) {
            const plot = plots[index];
            
            if (plot.element.dataset.state === 'empty' && selectedPlant) {
                const plant = plantTypes[selectedPlant];
                const cost = Math.round(plant.cost * priceInflation);
                if (money >= cost) {
                    plantSeed(index, selectedPlant);
                    money -= cost;
                    updateStats();
                } else {
                    alert('Недостаточно денег!');
                }
            } else if (plot.element.dataset.state === 'planted') {
                if (selectedFertilizer) {
                    applyFertilizer(index);
                } else {
                    // Полив теперь стоит денег
                    const cost = Math.round(waterCost * (activePets.includes('pig') ? 0.8 : 1));
                    if (money >= cost) {
                        money -= cost;
                        waterPlant(index);
                        updateStats();
                    } else {
                        alert(`Недостаточно денег для полива! Нужно ${cost} ₽.`);
                    }
                }
            } else if (plot.element.dataset.state === 'grown') {
                harvestPlant(index);
            }
        }
        
        // Посадить семя
        function plantSeed(index, plantType) {
            const plot = plots[index];
            const plantInfo = plantTypes[plantType];
            
            // Проверяем сезон
            const currentSeason = getCurrentSeason();
            if (plantInfo.season !== currentSeason && !(plot.fertilizer && plot.fertilizer.winterProof)) {
                alert(`Это растение растет только ${getSeasonName(plantInfo.season)}! Используйте зимнее удобрение.`);
                return;
            }
            
            plot.plant = plantType;
            plot.growth = 0;
            plot.watered = false;
            plot.special = plantInfo.special || (Math.random() < (plot.fertilizer?.specialChance || 0.01) + (activePets.includes('cat') ? 0.03 : 0));
            plot.regrowCount = 0;
            
            plot.element.dataset.state = 'planted';
            
            // Создаем элемент растения
            const plant = document.createElement('div');
            plant.className = 'plant' + (plot.special ? ' special-plant' : '');
            
            const plantImg = document.createElement('div');
            plantImg.className = 'plant-img';
            plantImg.style.backgroundImage = `url('https://emojicdn.elk.sh/${encodeURIComponent(plantInfo.image)}?style=google')`;
            plant.appendChild(plantImg);
            
            plant.dataset.growth = '0';
            
            // Удаляем старое растение, если было
            const oldPlant = plot.element.querySelector('.plant');
            if (oldPlant) plot.element.removeChild(oldPlant);
            
            plot.element.appendChild(plant);
            
            // Обновляем прогресс
            updatePlantProgress(index);
            
            // Показываем подсказку
            showTooltip(plot.element, `Посажено: ${plantInfo.name}${plot.special ? ' (Особое!)' : ''}`);
        }
        
        // Получить текущий сезон
        function getCurrentSeason() {
            const seasonCycle = ['spring', 'summer', 'autumn', 'winter'];
            const seasonIndex = Math.floor((currentDay - 1) / 30) % 4; // Смена каждые 30 дней
            return seasonCycle[seasonIndex];
        }
        
        // Полить растение
        function waterPlant(index) {
            const plot = plots[index];
            if (plot.element.dataset.state !== 'planted') return;
            
            plot.watered = true;
            
            // Анимация капли воды
            const waterDrop = plot.element.querySelector('.water-drop');
            waterDrop.style.opacity = '1';
            setTimeout(() => {
                waterDrop.style.opacity = '0';
            }, 1000);
            
            // Ускоряем рост
            updatePlantProgress(index);
            
            showTooltip(plot.element, `${plantTypes[plot.plant].name} полито! (-${Math.round(waterCost * (activePets.includes('pig') ? 0.8 : 1))} ₽)`);
        }
        
        // Полить все растения
        function waterAll() {
            let wateredCount = 0;
            const costPerPlant = Math.round(waterCost * (activePets.includes('pig') ? 0.8 : 1));
            const totalCost = plots.reduce((total, plot) => {
                if (plot.element.dataset.state === 'planted') {
                    return total + costPerPlant;
                }
                return total;
            }, 0);
            
            if (money >= totalCost) {
                plots.forEach((plot, index) => {
                    if (plot.element.dataset.state === 'planted') {
                        money -= costPerPlant;
                        wateredCount++;
                        waterPlant(index);
                    }
                });
                updateStats();
                showTooltip(document.getElementById('controls'), `Полито ${wateredCount} растений! Потрачено ${totalCost} ₽`);
            } else {
                alert(`Недостаточно денег! Нужно ${totalCost} ₽ для полива всех растений.`);
            }
        }
        
        // Обновить прогресс роста растения
        function updatePlantProgress(index) {
            const plot = plots[index];
            if (!plot.plant) return;
            
            const plantElement = plot.element.querySelector('.plant');
            if (!plantElement) return;
            
            const plantType = plantTypes[plot.plant];
            
            // Рассчитываем прирост роста с учетом всех модификаторов
            let growthIncrement = 1;
            
            // Базовый прирост
            if (plot.watered) growthIncrement *= 1.5;
            
            // Удобрение
            if (plot.fertilized) {
                let fertilizerMultiplier = plot.fertilizer.growthMultiplier || 1;
                if (activePets.includes('bee')) fertilizerMultiplier *= 1.1;
                if (activePets.includes('owl') && !plot.fertilizer.eternal) plot.fertilizerDaysLeft += 0.2; // Небольшой бонус от совы
                
                growthIncrement *= fertilizerMultiplier;
                
                // Специальные эффекты удобрений
                if (plot.fertilizer.rainBonus && currentWeather === 'rainy') growthIncrement *= (1 + plot.fertilizer.rainBonus);
                if (plot.fertilizer.sunnyBonus && currentWeather === 'sunny') growthIncrement *= (1 + plot.fertilizer.sunnyBonus);
                if (plot.fertilizer.randomEffect) growthIncrement *= (0.8 + Math.random() * 0.4); // Случайный множитель 0.8-1.2
            }
            
            // Погода
            growthIncrement *= weatherTypes[currentWeather].growthMultiplier;
            
            // Сезон - если не зимнее удобрение и не зимнее растение
            const currentSeason = getCurrentSeason();
            if (currentSeason === 'winter' && plantType.season !== 'winter' && !(plot.fertilizer && plot.fertilizer.winterProof)) {
                growthIncrement = 0;
            }
            
            // Эффект питомца (кролик)
            if (activePets.includes('rabbit')) growthIncrement *= 1.05;
            
            // Эффект локации
            growthIncrement *= locations[currentLocation].priceMultiplier;
            
            plot.growth += growthIncrement;
            
            const growthPercentage = (plot.growth / plantType.growthTime) * 100;
            
            plantElement.style.height = `${Math.min(growthPercentage, 100)}px`;
            plantElement.dataset.growth = plot.growth.toFixed(1);
            
            // Обновляем прогресс-бар
            let progressBar = plot.element.querySelector('.progress-bar');
            if (!progressBar) {
                progressBar = document.createElement('div');
                progressBar.className = 'progress-bar';
                const progress = document.createElement('div');
                progress.className = 'progress';
                progressBar.appendChild(progress);
                plot.element.appendChild(progressBar);
            }
            
            const progress = progressBar.querySelector('.progress');
            progress.style.width = `${growthPercentage}%`;
            
            // Проверяем, выросло ли растение
            checkPlantGrowth(index);
        }
        
        // Проверить, выросло ли растение
        function checkPlantGrowth(index) {
            const plot = plots[index];
            if (!plot.plant) return;
            
            const plantType = plantTypes[plot.plant];
            
            if (plot.growth >= plantType.growthTime) {
                plot.element.dataset.state = 'grown';
                plot.element.style.backgroundColor = '#4CAF50';
                
                if (plot.special) {
                    plot.element.style.boxShadow = '0 0 15px gold';
                }
                
                // Добавляем иконку для регроу растений
                if (plantType.regrowable) {
                    const regrowIcon = document.createElement('div');
                    regrowIcon.className = 'regrow-icon';
                    regrowIcon.textContent = '↻';
                    plot.element.appendChild(regrowIcon);
                }
            }
        }
        
        // Собрать урожай
        function harvestPlant(index) {
            const plot = plots[index];
            if (plot.element.dataset.state !== 'grown') return;
            
            const plantType = plantTypes[plot.plant];
            let reward = plantType.reward;
            
            // Бонус за особое растение
            if (plot.special) {
                reward *= 3;
                specialPlantsCount++;
            }
            
            // Эффект питомца (корова)
            if (activePets.includes('cow') && plot.regrowCount === 0) {
                reward *= 2;
                showTooltip(plot.element, `${petTypes.cow.name} удваивает награду!`);
            }
            
            // Эффект удобрения (удвоение награды)
            if (plot.fertilized && plot.fertilizer.doubleReward) {
                reward *= 2;
            }
            
            // Эффект питомца (овца)
            if (activePets.includes('sheep')) {
                reward = Math.round(reward * 1.15);
            }
            
            // Применяем инфляцию к награде
            reward = Math.round(reward * (1 + (priceInflation - 1) * 0.5)); // Награда растет медленнее, чем цены
            
            money += reward;
            grownPlantsCount++;
            
            // Проверяем, можно ли регроу
            if (plantType.regrowable) {
                plot.regrowCount++;
                plot.growth = plantType.regrowTime ? plantType.growthTime - plantType.regrowTime : 0;
                plot.element.dataset.state = 'planted';
                
                // Удаляем иконку регроу (она добавится снова при достижении зрелости)
                const regrowIcon = plot.element.querySelector('.regrow-icon');
                if (regrowIcon) plot.element.removeChild(regrowIcon);
                
                updatePlantProgress(index);
            } else {
                plot.plant = null;
                plot.growth = 0;
                plot.watered = false;
                plot.fertilized = false;
                plot.fertilizer = null;
                plot.fertilizerDaysLeft = 0;
                plot.special = false;
                plot.regrowCount = 0;
                plot.element.dataset.state = 'empty';
                plot.element.style.backgroundColor = '#8d6e63';
                plot.element.style.boxShadow = 'none';
                
                // Удаляем растение и прогресс-бар
                const plant = plot.element.querySelector('.plant');
                if (plant) plot.element.removeChild(plant);
                
                const progressBar = plot.element.querySelector('.progress-bar');
                if (progressBar) plot.element.removeChild(progressBar);
            }
            
            updateStats();
            
            showTooltip(plot.element, `Собрано: ${plantType.name}${plot.special ? ' (Особое!)' : ''}<br>Получено: ${reward} ₽`);
        }
        
        // Собрать весь урожай
        function harvestAll() {
            plots.forEach((plot, index) => {
                if (plot.element.dataset.state === 'grown') {
                    harvestPlant(index);
                }
            });
            
            showTooltip(document.getElementById('controls'), 'Весь урожай собран!');
        }
        
        // Следующий день
        function nextDay() {
            currentDay++;
            weatherDaysLeft--;
            seasonDaysLeft--;
            restockDaysLeft--;
            daySeconds = 0;
            updateDayProgress();
            
            // Увеличиваем инфляцию каждые 10 дней
            if (currentDay % 10 === 0) {
                priceInflation *= 1.05; // 5% инфляция
                waterCost = Math.round(waterCost * 1.05);
                document.getElementById('water-cost').textContent = Math.round(waterCost * (activePets.includes('pig') ? 0.8 : 1));
            }
            
            // Вызываем погодные эффекты
            weatherTypes[currentWeather].onDayStart();
            
            // Меняем погоду, если срок истек
            if (weatherDaysLeft <= 0) {
                changeWeather();
            }
            
            // Меняем сезон, если срок истек
            if (seasonDaysLeft <= 0) {
                seasonDaysLeft = 30;
                updateAvailablePlants();
            }
            
            // Пополняем магазин, если срок истек
            if (restockDaysLeft <= 0) {
                restockDaysLeft = 5;
                updateAvailablePlants();
            }
            
            // Обновляем удобрения
            plots.forEach(plot => {
                if (plot.fertilized && !plot.fertilizer.eternal) {
                    plot.fertilizerDaysLeft--;
                    if (plot.fertilizerDaysLeft <= 0) {
                        plot.fertilized = false;
                        plot.fertilizer = null;
                    }
                }
            });
            
            // Уменьшаем полив
            plots.forEach(plot => {
                plot.watered = false;
            });
            
            // Проверяем рост растений
            plots.forEach((plot, index) => {
                if (plot.element.dataset.state === 'planted') {
                    // Случайные вредители (если нет лисы)
                    if (!activePets.includes('fox') && Math.random() < 0.05) {
                        plot.growth = Math.max(0, plot.growth - 0.5);
                    }
                    
                    updatePlantProgress(index);
                }
            });
            
            // Эффект питомца (курица)
            if (activePets.includes('chicken')) {
                money += 10;
                showTooltip(document.getElementById('pets-container'), `${petTypes.chicken.name} принесла вам 10 ₽!`);
            }
            
            updateStats();
        }
        
        // Досрочное пополнение магазина
        function restockNow() {
            if (money >= 200) {
                money -= 200;
                restockDaysLeft = 0;
                nextDay(); // Это вызовет обновление магазина
                updateStats();
                showTooltip(document.getElementById('controls'), 'Магазин пополнен досрочно!');
            } else {
                alert("Недостаточно денег! Нужно 200 ₽.");
            }
        }
        
        // Повредить случайное растение
        function damageRandomPlant() {
            const plantedPlots = plots.filter(p => p.element.dataset.state === 'planted' && 
                (!p.fertilizer || !p.fertilizer.stormProtection) &&
                (!activePets.includes('dog') || Math.random() > 0.5)); // 50% защиты от собаки
            
            if (plantedPlots.length === 0) return;
            
            const randomIndex = Math.floor(Math.random() * plantedPlots.length);
            const plot = plantedPlots[randomIndex];
            const plotIndex = plots.indexOf(plot);
            
            plot.growth = Math.max(0, plot.growth - 2);
            updatePlantProgress(plotIndex);
            
            showTooltip(plot.element, `Гроза повредила ${plantTypes[plot.plant].name}! Рост уменьшен.`);
        }
        
        // Изменить погоду
        function changeWeather() {
            const weatherKeys = Object.keys(weatherTypes);
            let newWeather;
            
            // 60% шанс на обычную погоду, 40% на особую
            if (Math.random() < 0.6) {
                newWeather = ['sunny', 'cloudy'][Math.floor(Math.random() * 2)];
            } else {
                newWeather = ['rainy', 'stormy', 'foggy', 'snowy'][Math.floor(Math.random() * 4)];
            }
            
            // Не повторяем одну и ту же погоду
            while (newWeather === currentWeather) {
                newWeather = weatherKeys[Math.floor(Math.random() * weatherKeys.length)];
            }
            
            currentWeather = newWeather;
            weatherDuration = 2 + Math.floor(Math.random() * 4); // 2-5 дней
            weatherDaysLeft = weatherDuration;
            
            // Обновляем отображение погоды
            const weatherIcon = document.getElementById('weather-icon');
            weatherIcon.className = `weather-icon ${weatherTypes[currentWeather].color}`;
            weatherIcon.textContent = weatherTypes[currentWeather].icon;
            
            document.getElementById('weather').textContent = weatherTypes[currentWeather].name;
            
            showTooltip(document.getElementById('stats'), `Погода изменилась: ${weatherTypes[currentWeather].name}<br>Эффект: ${weatherTypes[currentWeather].effect}`);
        }
        
        // Выбрать растение
        function selectPlant(plantType) {
            selectedPlant = plantType;
            selectedFertilizer = null;
            
            // Подсвечиваем выбранное растение
            document.querySelectorAll('.plant-option').forEach(option => {
                option.classList.remove('selected');
            });
            document.querySelector(`.plant-option[data-id="${plantType}"]`).classList.add('selected');
            
            // Снимаем выделение с удобрений
            document.querySelectorAll('.fertilizer').forEach(fertilizer => {
                fertilizer.style.borderColor = '#8d6e63';
            });
            
            showTooltip(document.getElementById('plant-selector'), `Выбрано: ${plantTypes[plantType].name}`);
        }
        
        // Купить и применить удобрение
        function buyFertilizer(fertilizerType) {
            const cost = Math.round(fertilizerTypes[fertilizerType].cost * priceInflation);
            if (money >= cost) {
                selectedFertilizer = fertilizerType;
                selectedPlant = null;
                
                // Подсвечиваем выбранное удобрение
                document.querySelectorAll('.fertilizer').forEach(fertilizer => {
                    fertilizer.style.borderColor = '#8d6e63';
                });
                event.target.style.borderColor = '#4caf50';
                
                // Снимаем выделение с растений
                document.querySelectorAll('.plant-option').forEach(option => {
                    option.classList.remove('selected');
                });
                
                showTooltip(event.target, `Готово к применению: ${fertilizerTypes[fertilizerType].name}<br>Кликните на грядку, чтобы применить.`);
            } else {
                alert('Недостаточно денег!');
            }
        }
        
        // Применить удобрение
        function applyFertilizer(index) {
            const plot = plots[index];
            if (!selectedFertilizer || plot.element.dataset.state !== 'planted') return;
            
            const cost = Math.round(fertilizerTypes[selectedFertilizer].cost * priceInflation);
            if (money >= cost) {
                money -= cost;
                plot.fertilized = true;
                plot.fertilizer = fertilizerTypes[selectedFertilizer];
                plot.fertilizerDaysLeft = fertilizerTypes[selectedFertilizer].duration || Infinity;
                
                // Анимация применения удобрения
                plot.element.style.boxShadow = '0 0 10px #4caf50';
                setTimeout(() => {
                    plot.element.style.boxShadow = 'none';
                }, 1000);
                
                updateStats();
                showTooltip(plot.element, `Применено: ${fertilizerTypes[selectedFertilizer].name}<br>Эффект: ${fertilizerTypes[selectedFertilizer].effect}`);
                
                // Сбрасываем выбор удобрения
                selectedFertilizer = null;
                document.querySelectorAll('.fertilizer').forEach(fertilizer => {
                    fertilizer.style.borderColor = '#8d6e63';
                });
            } else {
                alert('Недостаточно денег!');
            }
        }
        
        // Выбрать/отменить питомца
        function togglePet(petType) {
            const index = activePets.indexOf(petType);
            const petElement = event.target.closest('.pet');
            
            if (index === -1) {
                // Покупаем питомца
                const cost = petTypes[petType].cost;
                if (money >= cost) {
                    money -= cost;
                    activePets.push(petType);
                    petElement.classList.add('active');
                    updateStats();
                    showTooltip(petElement, `Вы купили ${petTypes[petType].name}!<br>Эффект: ${petTypes[petType].effect}`);
                    
                    // Обновляем отображение активных питомцев
                    document.getElementById('active-pets').textContent = activePets.map(p => petTypes[p].name).join(', ');
                    
                    // Обновляем стоимость полива, если выбрана свинья
                    if (petType === 'pig') {
                        document.getElementById('water-cost').textContent = Math.round(waterCost * 0.8);
                    }
                } else {
                    alert('Недостаточно денег!');
                }
            } else {
                // Продаем питомца (возвращаем половину стоимости)
                const refund = Math.floor(petTypes[petType].cost * 0.5);
                money += refund;
                activePets.splice(index, 1);
                petElement.classList.remove('active');
                updateStats();
                showTooltip(petElement, `Вы продали ${petTypes[petType].name} за ${refund} ₽`);
                
                // Обновляем отображение активных питомцев
                document.getElementById('active-pets').textContent = activePets.length ? activePets.map(p => petTypes[p].name).join(', ') : 'Нет';
                
                // Обновляем стоимость полива, если была свинья
                if (petType === 'pig') {
                    document.getElementById('water-cost').textContent = waterCost;
                }
            }
        }
        
        // Сменить локацию
        function changeLocation(location) {
            currentLocation = location;
            document.getElementById('current-location').textContent = locations[location].name;
            
            // Обновляем активную кнопку локации
            document.querySelectorAll('.location-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            showTooltip(event.target, `Вы перешли в локацию: ${locations[location].name}`);
        }
        
        // Запустить таймер дня
        function startDayTimer() {
            daySeconds = 0;
            updateDayProgress();
            
            // Обновляем каждую секунду
            dayTimer = setInterval(() => {
                daySeconds++;
                updateDayProgress();
                
                if (daySeconds >= 12) {
                    nextDay();
                }
            }, 1000);
        }
        
        // Обновить прогресс дня
        function updateDayProgress() {
            document.getElementById('day-time').textContent = daySeconds;
            const progressPercent = (daySeconds / 12) * 100;
            document.getElementById('day-progress-bar').style.width = `${progressPercent}%`;
        }
        
        // Обновить статистику
        function updateStats() {
            document.getElementById('day').textContent = currentDay;
            document.getElementById('money').textContent = money;
            document.getElementById('grown-count').textContent = grownPlantsCount;
            document.getElementById('special-count').textContent = specialPlantsCount;
            document.getElementById('season').textContent = getSeasonName(getCurrentSeason());
            document.getElementById('season-change').textContent = seasonDaysLeft;
            document.getElementById('restock-days').textContent = restockDaysLeft;
            document.getElementById('plot-cost').textContent = Math.round(plotCost * priceInflation);
        }
        
        // Показать подсказку
        function showTooltip(element, text) {
            const tooltip = document.getElementById('tooltip');
            tooltip.innerHTML = text;
            
            const rect = element.getBoundingClientRect();
            tooltip.style.left = `${rect.left + window.scrollX}px`;
            tooltip.style.top = `${rect.top + window.scrollY - 40}px`;
            tooltip.style.opacity = '1';
            
            setTimeout(() => {
                tooltip.style.opacity = '0';
            }, 2000);
        }
        
        // Прокрутить к разделу
        function scrollToSection(sectionId) {
            document.getElementById(sectionId).scrollIntoView({ behavior: 'smooth' });
        }
        
        // Настройка клавиатурных управлений
        function setupKeyboardControls() {
            document.addEventListener('keydown', (e) => {
                switch (e.key.toLowerCase()) {
                    case 'w': waterAll(); break;
                    case 'h': harvestAll(); break;
                }
            });
        }
        
        // Запуск игры
        window.onload = initGame;
    </script>
</body>
</html>
